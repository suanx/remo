services:
  remo:
    image: ghcr.io/suanx/remo:latest
    build: .
    ports: ["3000:3000"]
    restart: unless-stopped
    environment:
      - REMO_ADMIN_API_BEARER_TOKEN=changeme-secret-token
      - REMO_DATA_DIR=/data
    volumes:
      - ./remo-data:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s